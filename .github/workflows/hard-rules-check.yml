name: Hard Rules Check

# Runs the v4 5 Hard Rules (+ 3 meta-principles documented separately)
# against every PR and push to main. Honours tagged-exception commit prefixes:
#   [release] skips Rule 4 (templates)
#   [infra]   skips Rule 3 (Spec-before-Ship)
#   [docs]    skips Rule 3
#   [bulk]    skips the >50-file runaway guard (enforced by pre-commit-gate.sh;
#             CI scan does not re-check commit size)
#
# Source of truth: .claude/skills/hard-rules-check/scripts/check-all.sh
# This is a fast gate — it should complete in seconds, never minutes.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hard-rules:
    name: Hard Rules
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so Rules 3 + 4 can diff against main and scan
          # the commit-subject range for tagged-exception prefixes.
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run Hard Rules
        run: bash .claude/skills/hard-rules-check/scripts/check-all.sh
