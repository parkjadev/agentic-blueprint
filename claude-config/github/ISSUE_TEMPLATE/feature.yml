name: Feature
description: Propose a new feature or capability.
title: "feat: <short description>"
labels: ["type:feature", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a feature request. Please complete the sections below so the team has enough context to plan and prioritise.

        Once this issue is created, the next step is a technical spec in `docs/specs/<feature-slug>/`. The branch that implements this issue must be named `feat/<this-issue-number>-<slug>`.

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or business problem does this feature solve? Who is affected?
      placeholder: "Today, users can't… which means…"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: A brief description of what you want to build. Link to a PRD or spec if one exists.
      placeholder: "Add a … so that …"
    validations:
      required: true

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Bulleted list of conditions that must be true before this issue can be closed.
      value: |
        - [ ]
        - [ ]
        - [ ]
    validations:
      required: true

  - type: textarea
    id: out-of-scope
    attributes:
      label: Out of scope
      description: Anything that is explicitly NOT being built here, to keep the scope honest.
      placeholder: "- "

  - type: input
    id: spec
    attributes:
      label: Spec / PRD link
      description: Path to the technical spec or PRD, if it exists.
      placeholder: "docs/specs/user-profile/technical-spec.md"

  - type: dropdown
    id: scope
    attributes:
      label: Scope label
      description: Which area of the codebase is primarily affected? The `scope:*` label is applied automatically by `.github/workflows/auto-label.yml` after the issue is created.
      options:
        - "scope:api"
        - "scope:dashboard"
        - "scope:mobile"
        - "scope:schema"
        - "scope:auth"
        - "scope:workflow"
    validations:
      required: true
