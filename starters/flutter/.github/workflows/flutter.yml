name: Flutter CI

# Mobile CI — runs only when Flutter code changes.
# Path-filtered so web-only changes don't trigger a Flutter build.
# Adjust paths below to match your layout after copying the starter.

on:
  pull_request:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'starters/flutter/**'
  push:
    branches: [main]
    paths:
      - 'mobile/**'
      - 'starters/flutter/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      # Detect the Flutter root — works whether the starter was copied to
      # `mobile/` (the README quickstart layout) or stays in starters/flutter/.
      - name: Find Flutter root
        id: find-root
        run: |
          if [ -f mobile/pubspec.yaml ]; then
            echo "root=mobile" >> "$GITHUB_OUTPUT"
          elif [ -f starters/flutter/pubspec.yaml ]; then
            echo "root=starters/flutter" >> "$GITHUB_OUTPUT"
          else
            echo "::error::No pubspec.yaml found in mobile/ or starters/flutter/"
            exit 1
          fi

      - name: Install dependencies
        run: flutter pub get
        working-directory: ${{ steps.find-root.outputs.root }}

      - name: Analyze (fatal warnings)
        run: dart analyze --fatal-warnings
        working-directory: ${{ steps.find-root.outputs.root }}

      - name: Run tests
        run: flutter test
        working-directory: ${{ steps.find-root.outputs.root }}
